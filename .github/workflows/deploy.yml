name: Deploy Colanode App

on:
  push:
    branches: [main]
    paths:
      - 'hosting/docker/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Deploy to EC2 Instances
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up SSH key and known hosts
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        # Add known hosts with verbose output to catch failures
        ssh-keyscan -t rsa ${{ secrets.PUBLIC_EC2_IP }} >> ~/.ssh/known_hosts
        ssh-keyscan -t rsa ${{ secrets.PRIVATE_EC2_IP }} >> ~/.ssh/known_hosts
        # Optional: Confirm private key format is loaded
        head -n 5 ~/.ssh/id_rsa

    - name: Test SSH to Public EC2
      run: |
        ssh -vvv -o StrictHostKeyChecking=no ec2-user@${{ secrets.PUBLIC_EC2_IP }} "echo ✅ SSH to Public EC2 successful"

    - name: Deploy to Public EC2
      run: |
        scp docker/docker-compose.public.yml ec2-user@${{ secrets.PUBLIC_EC2_IP }}:/home/ec2-user/docker-compose.yml
        ssh ec2-user@${{ secrets.PUBLIC_EC2_IP }} << 'EOF'
          docker compose -f docker-compose.yml pull
          docker compose -f docker-compose.yml up -d
        EOF

    - name: Deploy to Private EC2 via Bastion (Public EC2)
      run: |
        scp docker/docker-compose.private.yml ec2-user@${{ secrets.PRIVATE_EC2_IP }}:/home/ec2-user/docker-compose.yml
        ssh -o ProxyJump=ec2-user@${{ secrets.PUBLIC_EC2_IP }} ec2-user@${{ secrets.PRIVATE_EC2_IP }} << 'EOF'
          docker compose -f docker-compose.yml pull
          docker compose -f docker-compose.yml up -d
        EOF
